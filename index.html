<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Funcionário</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="form-container">
    <h2>Cadastro de Funcionário</h2>
    <form id="cadastroForm">

      <div class="form-group">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" required placeholder="Digite o nome completo">
      </div>

      <div class="form-group">
        <label for="idade">Idade:</label>
        <input type="number" id="idade" required min="1" placeholder="Ex: 25">
      </div>

      <div class="form-group">
        <label for="cargo">Cargo:</label>
        <select id="cargo" required>
          <option value="" disabled selected>Selecione um cargo</option>
          <option value="Estagiário">Estagiário</option>
          <option value="Assistente Administrativo">Assistente Administrativo</option>
          <option value="Advogado">Advogado</option>
        </select>
      </div>

      <div class="form-group">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" maxlength="9" placeholder="00000-000" required>
        <span id="cepErro" class="erro-mensagem"></span>
      </div>

      <div id="secao-endereco">
        <div class="form-group">
          <label for="rua">Rua/Logradouro:</label>
          <input type="text" id="rua" readonly>
        </div>

        <div class="form-group">
          <label for="numero">Número:</label>
          <input type="text" id="numero" placeholder="Ex: 123 ou S/N">
        </div>

        <div class="form-group">
          <label for="bairro">Bairro:</label>
          <input type="text" id="bairro" readonly>
        </div>

        <div class="form-group">
          <label for="cidade">Cidade/UF:</label>
          <input type="text" id="cidade" readonly>
        </div>
      </div>

      <button type="submit">Cadastrar</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>

</html>
